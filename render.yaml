services:
  - type: web
    name: spider-ai-console
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: "npm ci --omit=dev"
    startCommand: node src/server.js
    healthCheckPath: /api/config
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: USE_DEMO_PROVIDER
        value: "true"
      - key: ENABLE_BG_CRAWL
        value: "false"
